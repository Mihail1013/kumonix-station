<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Survivor 2026</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; filter: contrast(1.2) brightness(1.1); }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .stats { font-size: 24px; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stats">SCORE: <span id="score">0</span></div>
        <div style="color: #ff0000;">HP: <span id="hp">100</span>%</div>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpEl = document.getElementById('hp');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let hp = 100;
const keys = {};

// Игрок
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 15,
    speed: 4,
    color: '#00ff00',
    angle: 0
};

const bullets = [];
const enemies = [];
const particles = [];

// Слушаем кнопки
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

// Эффект взрыва
function spawnParticles(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({
            x, y, 
            vX: (Math.random()-0.5)*10, 
            vY: (Math.random()-0.5)*10, 
            life: 1, 
            color
        });
    }
}

// Клик - выстрел
window.onmousedown = () => {
    if (hp <= 0) return;
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    bullets.push({
        x: player.x,
        y: player.y,
        vX: Math.cos(angle) * 12,
        vY: Math.sin(angle) * 12
    });
};

const mouse = { x: 0, y: 0 };
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };

function spawnEnemy() {
    if (hp <= 0) return;
    const size = 20;
    let x, y;
    if (Math.random() < 0.5) {
        x = Math.random() < 0.5 ? -size : canvas.width + size;
        y = Math.random() * canvas.height;
    } else {
        x = Math.random() * canvas.width;
        y = Math.random() < 0.5 ? -size : canvas.height + size;
    }
    enemies.push({ x, y, size, speed: 1.5 + (score/100) });
}
setInterval(spawnEnemy, 800);

function update() {
    if (hp <= 0) return;

    // Движение
    if (keys['KeyW']) player.y -= player.speed;
    if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed;
    if (keys['KeyD']) player.x += player.speed;

    // Пули
    bullets.forEach((b, i) => {
        b.x += b.vX; b.y += b.vY;
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    });

    // Враги
    enemies.forEach((en, i) => {
        const angle = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(angle) * en.speed;
        en.y += Math.sin(angle) * en.speed;

        // Коллизия с игроком
        if (Math.hypot(player.x - en.x, player.y - en.y) < player.size + en.size) {
            hp -= 0.5;
            hpEl.innerText = Math.max(0, Math.floor(hp));
            if (hp <= 0) alert("GAME OVER! Score: " + score);
        }

        // Попадание пули
        bullets.forEach((b, bi) => {
            if (Math.hypot(b.x - en.x, b.y - en.y) < en.size) {
                spawnParticles(en.x, en.y, '#ff0055');
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += 10;
                scoreEl.innerText = score;
            }
        });
    });

    // Частицы
    particles.forEach((p, i) => {
        p.x += p.vX; p.y += p.vY; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    // Темный фон с эффектом размытия для "шлейфа"
    ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Свечение для игрока
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ff00';
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();

    // Враги (Красный неон)
    ctx.shadowColor = '#ff0055';
    ctx.fillStyle = '#ff0055';
    enemies.forEach(en => {
        ctx.beginPath();
        ctx.rect(en.x - en.size/2, en.y - en.size/2, en.size, en.size);
        ctx.fill();
    });

    // Пули
    ctx.shadowColor = '#ffff00';
    ctx.fillStyle = '#ffff00';
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
        ctx.fill();
    });

    // Отрисовка частиц
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
    });
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
