<!DOCTYPE html>
<html>
<head>
    <title>JS Zombie Apocalypse</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; }
        canvas { display: block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Картинки (используем бесплатные спрайты)
const imgPlayer = new Image(); imgPlayer.src = 'https://img.icons8.com/color/96/soldier.png';
const imgZombie = new Image(); imgZombie.src = 'https://img.icons8.com/color/96/zombie-side-view.png';
const imgBlood = new Image(); imgBlood.src = 'https://img.icons8.com/color/48/drop-of-blood.png';

const player = { x: 0, y: 0, size: 50, speed: 5, angle: 0 };
const keys = {};
const bullets = [];
const enemies = [];
const bloodStains = [];
let score = 0;

window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

window.onmousedown = () => {
    const angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
    bullets.push({ x: player.x, y: player.y, vX: Math.cos(angle)*15, vY: Math.sin(angle)*15 });
};

const mouse = { x: 0, y: 0 };
window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };

function spawnEnemy() {
    const angle = Math.random() * Math.PI * 2;
    const dist = 800;
    enemies.push({ 
        x: player.x + Math.cos(angle) * dist, 
        y: player.y + Math.sin(angle) * dist, 
        size: 40 
    });
}
setInterval(spawnEnemy, 1000);

function update() {
    if (keys['KeyW']) player.y -= player.speed;
    if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed;
    if (keys['KeyD']) player.x += player.speed;

    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);

    bullets.forEach((b, i) => {
        b.x += b.vX; b.y += b.vY;
        if (Math.hypot(b.x - player.x, b.y - player.y) > 1000) bullets.splice(i, 1);
    });

    enemies.forEach((en, i) => {
        const angle = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(angle) * 2;
        en.y += Math.sin(angle) * 2;

        bullets.forEach((b, bi) => {
            if (Math.hypot(b.x - en.x, b.y - en.y) < en.size) {
                bloodStains.push({x: en.x, y: en.y, size: 20 + Math.random()*20});
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score++;
            }
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Смещение камеры, чтобы игрок был в центре
    const camX = canvas.width/2 - player.x;
    const camY = canvas.height/2 - player.y;
    ctx.save();
    ctx.translate(camX, camY);

    // Рисуем сетку (пол)
    ctx.strokeStyle = '#333';
    for(let i = -2000; i < 2000; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, -2000); ctx.lineTo(i, 2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000, i); ctx.lineTo(2000, i); ctx.stroke();
    }

    // Кровь
    bloodStains.forEach(s => ctx.drawImage(imgBlood, s.x - s.size/2, s.y - s.size/2, s.size, s.size));

    // Игрок
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle + Math.PI/2);
    ctx.drawImage(imgPlayer, -player.size/2, -player.size/2, player.size, player.size);
    ctx.restore();

    // Враги
    enemies.forEach(en => {
        const enAngle = Math.atan2(player.y - en.y, player.x - en.x);
        ctx.save();
        ctx.translate(en.x, en.y);
        ctx.rotate(enAngle + Math.PI/2);
        ctx.drawImage(imgZombie, -en.size/2, -en.size/2, en.size, en.size);
        ctx.restore();
    });

    // Пули
    ctx.fillStyle = 'yellow';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));

    ctx.restore();

    // UI
    ctx.fillStyle = 'white';
    ctx.font = '20px Arial';
    ctx.fillText(`Kills: ${score}`, 20, 40);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
